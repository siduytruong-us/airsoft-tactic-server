# Fly.io config — STAGING
# Deploy manually:  flyctl deploy -c fly.staging.toml --remote-only
# App must exist first:  flyctl apps create airsoft-tactic-server-staging

app = "airsoft-tactic-server-staging"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "staging"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
