version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: airsoft-local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - airsoft_postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d   # chạy khi init DB lần đầu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  airsoft_postgres_data:
    name: airsoft_postgres_data
