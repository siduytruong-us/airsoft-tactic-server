spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: airsoft-tactic-server
  profiles:
    active: ${SPRING_PROFILE:dev}

  datasource:
    # Use environment variables first, then default values (if safe)
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

supabase:
  url: ${SUPABASE_URL:}
  # New key format
  publishable-key: ${SUPABASE_PUBLISHABLE_KEY:}
  secret-key: ${SUPABASE_SECRET_KEY:}
  # Legacy keys (vẫn dùng được)
  anon-key: ${SUPABASE_ANON_KEY:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  # JWT validation
  jwt-secret: ${SUPABASE_JWT_SECRET:}

logging:
  level:
    root: INFO
    com.airsoft: DEBUG
    org.springframework.security: DEBUG
