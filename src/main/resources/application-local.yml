# Profile: local — PostgreSQL chạy trên Docker local
# Kích hoạt: SPRING_PROFILE=local trong .env.local

spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 3000
      idle-timeout: 300000

logging:
  level:
    com.airsoft: DEBUG   # local: verbose hơn để debug app logic
