# Fly.io config — PRODUCTION
# Deploy manually:  flyctl deploy -c fly.production.toml --remote-only
# App must exist first:  flyctl apps create airsoft-tactic-server-production

app = "airsoft-tactic-server-production"
primary_region = "dfw"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
